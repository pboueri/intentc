<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Different Models - Screenshot Grid</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 40px;
  }
  h1 { font-size: 24px; margin-bottom: 6px; }
  .subtitle { color: var(--text-muted); font-size: 13px; margin-bottom: 28px; }

  .grid {
    display: grid;
    grid-template-columns: 80px 1fr 1fr 1fr;
    gap: 0;
    max-width: 1400px;
  }

  .header-cell {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 12px 16px;
    font-weight: 600;
    font-size: 15px;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .corner { background: var(--bg); border-color: transparent; }

  .row-label {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 12px 8px;
    font-weight: 600;
    font-size: 13px;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    writing-mode: horizontal-tb;
  }

  .cell {
    border: 1px solid var(--border);
    padding: 8px;
    text-align: center;
    background: var(--bg);
  }
  .cell img {
    width: 100%;
    border-radius: 4px;
    display: block;
  }
  .cell .fail-marker {
    width: 100%;
    height: 240px;
    background: rgba(248, 81, 73, 0.08);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
  }
  .fail-marker .x {
    font-size: 64px;
    color: #f85149;
    font-weight: 700;
    line-height: 1;
  }
  .fail-marker .label {
    font-size: 12px;
    color: #f85149;
    opacity: 0.7;
  }
  .cell .na {
    width: 100%;
    height: 240px;
    background: rgba(139, 148, 158, 0.05);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    font-size: 13px;
  }
</style>
</head>
<body>

<h1>Visual Comparison Grid</h1>
<p class="subtitle">Columns: models &nbsp;|&nbsp; Rows: thinking effort level</p>

<div class="grid">
  <!-- Header row -->
  <div class="corner"></div>
  <div class="header-cell">Haiku</div>
  <div class="header-cell">Sonnet</div>
  <div class="header-cell">Opus</div>

  <!-- Row: Low -->
  <div class="row-label">Low</div>
  <div class="cell"><div class="na">N/A</div></div>
  <div class="cell"><img src="screenshots/sonnet_low.png" alt="Sonnet Low"></div>
  <div class="cell"><img src="screenshots/opus_low.png" alt="Opus Low"></div>

  <!-- Row: Medium -->
  <div class="row-label">Medium</div>
  <div class="cell">
    <div class="fail-marker">
      <span class="x">X</span>
      <span class="label">Build failed</span>
    </div>
  </div>
  <div class="cell"><img src="screenshots/sonnet_medium.png" alt="Sonnet Medium"></div>
  <div class="cell"><img src="screenshots/opus_medium.png" alt="Opus Medium"></div>

  <!-- Row: High -->
  <div class="row-label">High</div>
  <div class="cell"><div class="na">N/A</div></div>
  <div class="cell"><img src="screenshots/sonnet_high.png" alt="Sonnet High"></div>
  <div class="cell"><img src="screenshots/opus_high.png" alt="Opus High"></div>
</div>

</body>
</html>
