<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shape Canvas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
        }
        canvas {
            display: block;
            border: 2px solid #444;
        }
    </style>
</head>
<body>
    <canvas id="shapeCanvas"></canvas>
    <script>
        const canvas = document.getElementById('shapeCanvas');
        const ctx = canvas.getContext('2d');

        // Shape definitions
        function createCircle(cx, cy, radius, color) {
            return { type: 'circle', cx, cy, radius, color };
        }

        function createTriangle(x1, y1, x2, y2, x3, y3, color) {
            return { type: 'triangle', points: [{x: x1, y: y1}, {x: x2, y: y2}, {x: x3, y: y3}], color };
        }

        function createRectangle(x, y, width, height, color) {
            return { type: 'rectangle', x, y, width, height, color };
        }

        // Shape rendering
        function drawShape(shape) {
            ctx.fillStyle = shape.color;
            switch (shape.type) {
                case 'circle':
                    ctx.beginPath();
                    ctx.arc(shape.cx, shape.cy, shape.radius, 0, Math.PI * 2);
                    ctx.fill();
                    break;
                case 'triangle':
                    ctx.beginPath();
                    ctx.moveTo(shape.points[0].x, shape.points[0].y);
                    ctx.lineTo(shape.points[1].x, shape.points[1].y);
                    ctx.lineTo(shape.points[2].x, shape.points[2].y);
                    ctx.closePath();
                    ctx.fill();
                    break;
                case 'rectangle':
                    ctx.fillRect(shape.x, shape.y, shape.width, shape.height);
                    break;
            }
        }

        // Scene: shapes positioned relative to canvas quadrants
        function buildScene(w, h) {
            const midX = w / 2;
            const midY = h / 2;
            const unit = Math.min(w, h) / 8;

            return [
                // Top-left quadrant: circle
                createCircle(midX / 2, midY / 2, unit, '#e74c3c'),
                // Top-right quadrant: triangle
                createTriangle(
                    midX + midX / 2, midY / 2 - unit,
                    midX + midX / 2 - unit, midY / 2 + unit,
                    midX + midX / 2 + unit, midY / 2 + unit,
                    '#2ecc71'
                ),
                // Bottom-left quadrant: red circle
                createCircle(midX / 2, midY + midY / 2, unit, '#e74c3c'),
                // Bottom-right quadrant: additional shapes
                createCircle(midX + midX / 2 - unit, midY + midY / 2, unit * 0.6, '#f39c12'),
                createRectangle(
                    midX + midX / 2 + unit * 0.2, midY + midY / 2 - unit * 0.5,
                    unit, unit,
                    '#9b59b6'
                ),
            ];
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            draw();
        }

        function draw() {
            const w = canvas.width;
            const h = canvas.height;
            const midX = w / 2;
            const midY = h / 2;

            // Background
            ctx.fillStyle = '#f5f5f5';
            ctx.fillRect(0, 0, w, h);

            // Quadrant dividers
            ctx.strokeStyle = '#ccc';
            ctx.lineWidth = 1;
            ctx.setLineDash([6, 4]);

            ctx.beginPath();
            ctx.moveTo(midX, 0);
            ctx.lineTo(midX, h);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(0, midY);
            ctx.lineTo(w, midY);
            ctx.stroke();

            ctx.setLineDash([]);

            // Quadrant labels
            ctx.fillStyle = '#bbb';
            ctx.font = '14px sans-serif';
            ctx.textAlign = 'center';
            const pad = 30;
            ctx.fillText('Top-Left', midX / 2, pad);
            ctx.fillText('Top-Right', midX + midX / 2, pad);
            ctx.fillText('Bottom-Left', midX / 2, midY + pad);
            ctx.fillText('Bottom-Right', midX + midX / 2, midY + pad);

            // Draw shapes
            const shapes = buildScene(w, h);
            shapes.forEach(drawShape);
        }

        window.addEventListener('resize', resize);
        resize();
    </script>
</body>
</html>
