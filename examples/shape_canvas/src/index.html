<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shape Canvas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            draw();
        }

        function draw() {
            const w = canvas.width;
            const h = canvas.height;
            const midX = w / 2;
            const midY = h / 2;

            // Background
            ctx.fillStyle = "#f0f0f0";
            ctx.fillRect(0, 0, w, h);

            // Border
            ctx.strokeStyle = "#333";
            ctx.lineWidth = 2;
            ctx.strokeRect(1, 1, w - 2, h - 2);

            // Quadrant dividers
            ctx.strokeStyle = "#ccc";
            ctx.lineWidth = 1;
            ctx.setLineDash([6, 4]);

            ctx.beginPath();
            ctx.moveTo(midX, 0);
            ctx.lineTo(midX, h);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(0, midY);
            ctx.lineTo(w, midY);
            ctx.stroke();

            ctx.setLineDash([]);

            // Quadrant labels
            ctx.fillStyle = "#aaa";
            ctx.font = "14px sans-serif";
            ctx.fillText("Top-Left", 10, 20);
            ctx.fillText("Top-Right", midX + 10, 20);
            ctx.fillText("Bottom-Left", 10, midY + 20);
            ctx.fillText("Bottom-Right", midX + 10, midY + 20);
        }

        window.addEventListener("resize", resize);
        resize();
    </script>
</body>
</html>
